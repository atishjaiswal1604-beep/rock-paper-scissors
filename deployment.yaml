apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rps-app
  template:
    metadata:
      labels:
        app: rps-app
    spec:
      containers:
      - name: rps-app
        image: 228096284456.dkr.ecr.ap-south-2.amazonaws.com/cargame1:new
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: rps-service
spec:
  type: LoadBalancer
  selector:
    app: rps-app
  ports:
    - port: 80
      targetPort: 5000
